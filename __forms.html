<!DOCTYPE html>
<html lang="zh-TW">
  <body>
    <!-- Static skeleton for Netlify Forms build-time detection -->
    <form name="inquiry" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="inquiry" />
      <input name="bot-field" />
      <input name="company" />
      <input name="name" />
      <input name="phone" />
      <input name="email" />
      <select name="product_type">
        <option value="文具禮品">文具禮品</option>
        <option value="食品生醫">食品生醫</option>
        <option value="電子五金">電子五金</option>
        <option value="印刷包裝">印刷包裝</option>
        <option value="其他">其他</option>
      </select>
      <input name="quantity" />
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
